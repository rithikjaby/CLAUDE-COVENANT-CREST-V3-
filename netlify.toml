# =============================================================
# netlify.toml — Covenant Crest Group Ltd
# covenantcrest.co.uk
# =============================================================
#
# REGISTERED NETLIFY FORMS (3 total):
#   1.  contact         → index.html  (General contact form)
#   2.  haulage-quote   → haulage.html (Haulage quote request)
#   3.  trade-enquiry   → trade.html  (Trade & import enquiry)
#
# TO RECEIVE EMAIL NOTIFICATIONS FOR FORM SUBMISSIONS:
#   Netlify Dashboard → Sites → [your site] → Forms
#   → Click form name → Form notifications
#   → Add notification → Email → jaby.k@covenantcrest.co.uk
#   (Repeat for all 3 forms)
#
# =============================================================

[build]
  publish = "."

# =============================================================
# SECURITY HEADERS — applied to all pages
# =============================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(), payment=()"
    # Adjust connect-src if you add analytics or an external API
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.netlify.com; form-action 'self';"

# Strict cache for fonts (immutable)
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images — 30 days
[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Admin & login — no caching (always fresh)
[[headers]]
  for = "/admin.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Robots-Tag  = "noindex, nofollow"

[[headers]]
  for = "/login.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Robots-Tag  = "noindex, nofollow"

# =============================================================
# REDIRECTS
# =============================================================

# Clean URL aliases → canonical HTML paths
[[redirects]]
  from   = "/home"
  to     = "/"
  status = 301

[[redirects]]
  from   = "/haulage-services"
  to     = "/haulage.html"
  status = 301

[[redirects]]
  from   = "/haulage-services.html"
  to     = "/haulage.html"
  status = 301

[[redirects]]
  from   = "/import"
  to     = "/trade.html"
  status = 301

[[redirects]]
  from   = "/trade-services"
  to     = "/trade.html"
  status = 301

[[redirects]]
  from   = "/trade-services.html"
  to     = "/trade.html"
  status = 301

[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 301

[[redirects]]
  from   = "/login"
  to     = "/login.html"
  status = 301

[[redirects]]
  from   = "/privacy"
  to     = "/privacy.html"
  status = 301

# =============================================================
# BACKEND API PROXY (uncomment when Node.js backend is deployed)
# Replace YOUR_BACKEND_URL with your Render / Railway / Heroku URL
# =============================================================
# [[redirects]]
#   from   = "/api/*"
#   to     = "https://YOUR_BACKEND_URL.onrender.com/api/:splat"
#   status = 200
#   force  = true
#   [redirects.headers]
#     X-From-Netlify = "1"

# =============================================================
# 404 FALLBACK (optional — only enable for SPA routing)
# =============================================================
# [[redirects]]
#   from   = "/*"
#   to     = "/index.html"
#   status = 200
